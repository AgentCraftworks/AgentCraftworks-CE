# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: agentcraftworks-ce
metadata:
  template: agentcraftworks-ce@0.1.0

services:
  typescript-api:
    project: ./typescript
    language: js
    host: containerapp
    docker:
      path: ./Dockerfile
      # Context is relative to the service project directory.
      context: .
    env:
      PORT: 3000
      NODE_ENV: production

# Infrastructure resources
resources:
  postgres:
    type: postgres
    uses:
      - typescript-api
  redis:
    type: redis
    uses:
      - typescript-api

hooks:
  # Run smoke tests after deployment
  postdeploy:
    shell: sh
    run: |
      APP_URL="${TYPESCRIPT_APP_URL:-}"
      if [ -z "$APP_URL" ]; then
        echo "Skipping postdeploy smoke tests: TYPESCRIPT_APP_URL is not set."
        exit 0
      fi

      echo "Running smoke tests against deployed app: $APP_URL"
      cd typescript
      npm ci

      # Container Apps ingress can be available before the app is fully warm.
      # Retry smoke tests to reduce false negatives during fresh deployments.
      ATTEMPTS=5
      DELAY_SECONDS=15
      i=1
      while [ "$i" -le "$ATTEMPTS" ]; do
        echo "Smoke test attempt $i/$ATTEMPTS"
        if BASE_URL="$APP_URL" npx tsx smoke-test.ts; then
          exit 0
        fi

        if [ "$i" -lt "$ATTEMPTS" ]; then
          echo "Smoke tests failed; waiting ${DELAY_SECONDS}s before retry..."
          sleep "$DELAY_SECONDS"
        fi

        i=$((i + 1))
      done

      echo "Smoke tests failed after $ATTEMPTS attempts."
      exit 1
